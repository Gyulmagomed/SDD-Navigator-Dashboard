# SDD Navigator — проверки качества на каждый push/PR в main и master.
# Порядок: install → lint → typecheck → test:coverage → build.
# Корень репозитория должен совпадать с каталогом приложения (рядом package.json).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXTAUTH_SECRET: ci-build-placeholder-secret-min-32-chars
          NEXTAUTH_URL: http://localhost:3000
