services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sdd_navigator
      POSTGRES_USER: sdd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdd -d sdd_navigator"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4000
      DATABASE_URL: postgres://sdd:${POSTGRES_PASSWORD:-sdd}@postgres:5432/sdd_navigator?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      METRICS_ENABLED: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    profiles: ["observability"]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"

  nginx:
    image: nginx:1.27-alpine
    profiles: ["proxy"]
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
