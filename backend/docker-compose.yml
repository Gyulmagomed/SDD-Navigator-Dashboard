services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sdd_navigator
      POSTGRES_USER: sdd
      POSTGRES_PASSWORD: sdd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdd -d sdd_navigator"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      APP_ENV: production
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 4000
      DATABASE_URL: postgres://sdd:sdd@postgres:5432/sdd_navigator?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-docker-dev-jwt-secret-change-me-32chars}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      DEMO_USER_EMAIL: test@test.com
      DEMO_USER_PASSWORD: 123456
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
