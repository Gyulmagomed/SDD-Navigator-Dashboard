host: localhost:4000
info:
  contact: {}
  description: REST API for the SDD Navigator dashboard.
  title: SDD Navigator API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.loginRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/sdd-navigator_backend_internal_domain.LoginResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Login
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.refreshRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/sdd-navigator_backend_internal_domain.TokenPair'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Refresh access token
      tags:
      - auth
  /coverage/{specId}:
    get:
      parameters:
      - description: Specification ID
        in: path
        name: specId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.apiResponse-array_sdd-navigator_backend_internal_domain_CoverageMetric'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Coverage metrics by specification
      tags:
      - coverage
  /dashboard/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.apiResponse-sdd-navigator_backend_internal_domain_DashboardStats'
      security:
      - BearerAuth: []
      summary: Dashboard statistics
      tags:
      - dashboard
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /reports/export/{specId}:
    get:
      parameters:
      - description: Specification ID
        in: path
        name: specId
        required: true
        type: string
      - description: Export format
        enum:
        - pdf
        - csv
        - json
        in: query
        name: format
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Export specification report
      tags:
      - reports
  /specifications:
    get:
      parameters:
      - description: Status filter
        in: query
        name: status
        type: string
      - description: Owner filter
        in: query
        name: owner
        type: string
      - description: Search by name or id
        in: query
        name: search
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.apiResponse-array_internal_handler_specificationDTO'
      security:
      - BearerAuth: []
      summary: List specifications
      tags:
      - specifications
  /specifications/{id}:
    get:
      parameters:
      - description: Specification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.apiResponse-internal_handler_specificationDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get specification by id
      tags:
      - specifications
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
